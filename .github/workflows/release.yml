name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump level
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      notes:
        description: Highlights for the release notes (optional). Plain markdown, multi-line OK. Rendered above the auto-generated commit list.
        type: string
        required: false
        default: ''

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    name: Prepare release branch
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      branch: ${{ steps.version.outputs.branch }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute bumped version
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(jq -r '.version' package.json)
          if [ -z "$CURRENT" ] || [ "$CURRENT" = "null" ]; then
            echo "::error::could not parse version from package.json"
            exit 1
          fi
          IFS=. read -r MAJOR MINOR PATCH <<EOF
          $CURRENT
          EOF
          case '${{ inputs.bump }}' in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          VERSION="$MAJOR.$MINOR.$PATCH"
          TAG="v$VERSION"
          BRANCH="release/$TAG"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          PREVIOUS_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT -> $VERSION (${{ inputs.bump }}), branch $BRANCH (previous tag: ${PREVIOUS_TAG:-none})"

      - name: Fail if tag already exists on origin
        run: |
          set -euo pipefail
          TAG='${{ steps.version.outputs.tag }}'
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "::error::tag $TAG already exists on origin — delete the existing release+tag before re-running"
            exit 1
          fi

      - name: Create release branch with version bump
        id: commit
        # Pass the dispatch input through an env var instead of `${{ }}`
        # interpolation so backticks / quotes / newlines in the highlights
        # message can't break the shell script.
        env:
          HIGHLIGHTS: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          VERSION='${{ steps.version.outputs.version }}'
          BRANCH='${{ steps.version.outputs.branch }}'
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          # Rewrite the first `"version": "…"` line (the root package version)
          # with sed rather than jq, so the file's formatting and key order
          # survive untouched. bun.lock records no root version, so
          # `--frozen-lockfile` builds stay valid without touching the lock.
          sed -i -E '0,/"version": "[^"]+"/s//"version": "'"$VERSION"'"/' package.json
          git checkout -B "$BRANCH"
          git add package.json
          # When highlights are supplied, attach them as the commit body so the
          # bump commit doubles as the release-notes record (visible in
          # `git log` long after the GitHub Release UI is gone).
          if [ -n "$HIGHLIGHTS" ]; then
            git commit -m "Bump version to $VERSION" -m "$HIGHLIGHTS"
          else
            git commit -m "Bump version to $VERSION"
          fi
          git push --force origin "$BRANCH"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build and push image to GHCR
    needs: prepare
    runs-on: ubuntu-24.04-arm
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Build the exact commit prepare pushed — never a racing master.
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            APP_VERSION=${{ env.VERSION }}
            COMMIT_SHA=${{ needs.prepare.outputs.sha }}
            COMMIT_MSG=Release ${{ needs.prepare.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Merge and release
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
      BRANCH: ${{ needs.prepare.outputs.branch }}
      PREVIOUS_TAG: ${{ needs.prepare.outputs.previous_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master

      - name: Merge release branch into master
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git fetch origin "$BRANCH"
          if git merge --ff-only "origin/$BRANCH"; then
            echo "fast-forward merge into master"
          else
            echo "master moved since the release branch was cut — recording a merge commit"
            git merge --no-ff "origin/$BRANCH" -m "Merge $BRANCH"
          fi
          git push origin master

      - name: Create and push tag
        run: |
          set -euo pipefail
          # Tag the release-branch commit that was actually built, not the
          # merge commit — on a --no-ff merge the merge commit's tree includes
          # whatever raced onto master, which the pushed image doesn't have.
          # That commit is reachable from master after the merge regardless.
          git tag "$TAG" '${{ needs.prepare.outputs.sha }}'
          git push origin "$TAG"

      - name: Generate release notes
        id: notes
        # Pass the dispatch input through an env var instead of `${{ }}`
        # interpolation so backticks / quotes / newlines in the highlights
        # message can't break the shell script.
        env:
          HIGHLIGHTS: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          {
            if [ -n "$HIGHLIGHTS" ]; then
              echo "## Highlights"
              echo
              echo "$HIGHLIGHTS"
              echo
            fi
            echo "## Image"
            echo
            echo '```sh'
            echo 'docker pull ghcr.io/${{ github.repository }}:${{ env.VERSION }}'
            echo '```'
            echo
            echo "## Changes"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              git log "$PREVIOUS_TAG..$TAG" --pretty=format:'- %s' --no-merges
            else
              git log "$TAG" --pretty=format:'- %s' --no-merges
            fi
          } > release-notes.md
          echo "notes_path=$GITHUB_WORKSPACE/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          body_path: ${{ steps.notes.outputs.notes_path }}

      - name: Delete release branch
        run: git push origin --delete "$BRANCH"
